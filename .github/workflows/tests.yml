name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        lfs: true

    - name: Build Docker image
      run: docker-compose build

    - name: Run Tests in Docker
      run: docker-compose run --rm fatrec32 bash -c "make && chmod +x run-test.sh && ./run-test.sh"
